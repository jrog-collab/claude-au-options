<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude in Australia — Deployment Options</title>
<style>
  :root {
    --ant-bg: #F0EEE6;
    --ant-card: #FFFFFF;
    --ant-ink: #191919;
    --ant-muted: #6B6255;
    --ant-line: #E0DACC;
    --ant-accent: #CC785C;
    --ant-accent-dark: #A85A3F;
    --ant-green: #5A7A4A;
    --ant-amber: #B7832F;
    --ant-red: #B05050;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--ant-bg);
    color: var(--ant-ink);
    line-height: 1.5;
  }
  header {
    padding: 28px 32px 8px;
    max-width: 960px;
    margin: 0 auto;
  }
  header .logo {
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ant-muted);
    display: flex; align-items: center; gap: 10px;
  }
  header .logo svg { width: 20px; height: 20px; }
  header h1 {
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    font-weight: 500;
    font-size: 34px;
    margin: 6px 0 4px;
  }
  header p { color: var(--ant-muted); margin: 0 0 8px; max-width: 620px; }

  .wizard {
    max-width: 960px;
    margin: 12px auto 40px;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 28px;
  }
  @media (max-width: 820px) { .wizard { grid-template-columns: 1fr; } }

  /* ---- progress rail ---- */
  .rail { position: relative; }
  .rail ol { list-style: none; margin: 0; padding: 0; position: sticky; top: 20px; }
  .rail li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; color: var(--ant-muted); font-size: 14px;
    cursor: default;
  }
  .rail li .dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--ant-line); background: var(--ant-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0;
  }
  .rail li.active { color: var(--ant-ink); font-weight: 600; }
  .rail li.active .dot { border-color: var(--ant-accent); background: var(--ant-accent); color: #fff; }
  .rail li.done { color: var(--ant-ink); }
  .rail li.done .dot { border-color: var(--ant-accent); color: var(--ant-accent); }
  .rail li.locked { opacity: 0.35; }

  /* ---- step cards ---- */
  .stage { min-height: 360px; }
  .step {
    background: var(--ant-card);
    border: 1px solid var(--ant-line);
    border-radius: 14px;
    padding: 26px 28px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .step h2 {
    font-family: ui-serif, Georgia, serif;
    font-weight: 500; font-size: 22px; margin: 0 0 4px;
  }
  .step .sub { color: var(--ant-muted); font-size: 14px; margin-bottom: 18px; }

  .options { display: grid; gap: 10px; }
  .options.two { grid-template-columns: 1fr 1fr; }
  @media (max-width: 640px) { .options.two { grid-template-columns: 1fr; } }

  .opt {
    border: 1.5px solid var(--ant-line);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all .12s ease;
    background: #fff;
    position: relative;
  }
  .opt:hover { border-color: var(--ant-accent); }
  .opt.selected { border-color: var(--ant-accent); background: #FBF3EE; }
  .opt.selected::after {
    content: "✓"; position: absolute; top: 10px; right: 12px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ant-accent); color: #fff; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .opt .label { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 10px; }
  .opt .label svg { width: 22px; height: 22px; flex-shrink: 0; }
  .opt .desc { font-size: 13px; color: var(--ant-muted); margin-top: 2px; }
  .opt.disabled { opacity: 0.4; cursor: not-allowed; }
  .opt.disabled:hover { border-color: var(--ant-line); }

  .actions { display: flex; justify-content: space-between; margin-top: 22px; }
  button {
    font: inherit; border: none; cursor: pointer;
    padding: 10px 18px; border-radius: 8px; font-weight: 600;
  }
  button.primary { background: var(--ant-accent); color: #fff; }
  button.primary:hover { background: var(--ant-accent-dark); }
  button.primary:disabled { background: var(--ant-line); color: var(--ant-muted); cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--ant-muted); }
  button.ghost:hover { color: var(--ant-ink); }

  .note {
    margin-top: 16px; padding: 12px 14px; border-radius: 8px;
    background: #FDF6EC; border: 1px solid #EBD9B4;
    font-size: 13px; color: #5C4A1F;
  }
  .note.red { background: #FBEEEE; border-color: #E8C4C4; color: #6B2F2F; }

  /* ---- result ---- */
  .result h2 { font-size: 24px; }
  .reco {
    border: 1.5px solid var(--ant-accent);
    background: #FBF3EE;
    border-radius: 12px;
    padding: 18px 20px;
    margin: 14px 0 18px;
  }
  .reco .tag {
    display: inline-block; font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; background: var(--ant-accent); color: #fff;
    padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
  }
  .reco h3 { margin: 0 0 6px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
  .reco h3 svg { width: 24px; height: 24px; flex-shrink: 0; }
  .reco p { margin: 0; font-size: 14px; color: var(--ant-ink); }
  .reco.alt { border-color: var(--ant-line); background: #fff; }
  .reco.alt .tag { background: var(--ant-muted); }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill {
    font-size: 12px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--ant-line); background: #fff; color: var(--ant-muted);
  }
  .pill.on { background: #EAF1E6; border-color: #C7D7BE; color: var(--ant-green); }
  .pill.off { background: #F6F4EF; color: #B0A995; text-decoration: line-through; }

  table.matrix {
    width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px;
  }
  table.matrix th, table.matrix td {
    text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--ant-line);
  }
  table.matrix th { font-weight: 600; color: var(--ant-muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em;}
  table.matrix td.plat { display: flex; align-items: center; gap: 8px; }
  table.matrix td.plat svg { width: 18px; height: 18px; flex-shrink: 0; }
  .yes { color: var(--ant-green); font-weight: 600; }
  .no  { color: #C4BBA8; }
  .au  { color: var(--ant-amber); font-weight: 600; }

  .footer { max-width: 960px; margin: 0 auto 40px; padding: 0 32px; font-size: 12px; color: var(--ant-muted); }
</style>
</head>
<body>

<header>
  <div class="logo"><svg><use href="#lg-anthropic"/></svg> Anthropic · Australia</div>
  <h1>How will you consume Claude?</h1>
  <p>Four quick questions to map your data-residency, cloud and product requirements to the right Claude deployment path.</p>
</header>

<div class="wizard">
  <nav class="rail">
    <ol id="rail"></ol>
  </nav>
  <div class="stage" id="stage"></div>
</div>

<div class="footer">
  Guidance only — availability current as of May 2026. Confirm regional availability with your Anthropic account team.
</div>

<script>
/* ---------------- state ---------------- */
const state = {
  step: 0,
  residency: null,          // 'au' | 'any'
  clouds: new Set(),        // 'aws' 'gcp' 'azure'
  direct: null,             // 'yes' | 'no'
  products: new Set(),      // 'code' 'cowork' 'chat' 'api'
  addons: new Set(),        // 'design' 'security'
  addonsNone: false,
};

const STEPS = [
  { key: 'clouds',    label: 'Your clouds' },
  { key: 'direct',    label: 'Direct relationship' },
  { key: 'residency', label: 'Data residency' },
  { key: 'products',  label: 'Claude products' },
  { key: 'addons',    label: 'Design & Security' },
  { key: 'result',    label: 'Recommendation' },
];
const RESIDENCY_STEP = 2;
const RESULT_STEP = 5;

const ALL_APPS = ['code','cowork','chat','design','security'];
const PLATFORMS = {
  '1p':      { name: 'Anthropic (1P / Claude Enterprise)',     logo: 'anthropic', au: false, api: true, apps: new Set(ALL_APPS) },
  'aws-mkt': { name: 'Claude Enterprise via AWS Marketplace',  logo: 'aws',       au: false, api: true, apps: new Set(ALL_APPS) },
  'bedrock': { name: 'AWS Bedrock',                            logo: 'aws',       au: true,  api: true, apps: new Set(['code','cowork']) },
  'vertex':  { name: 'Google Cloud Vertex AI',                 logo: 'gcp',       au: false, api: true, apps: new Set(['code','cowork']) },
  'azure':   { name: 'Microsoft Azure AI Foundry',             logo: 'azure',     au: false, api: true, apps: new Set() },
};

function logo(id){ return `<svg><use href="#lg-${id}"/></svg>`; }

const APP_LABELS = { code:'Claude Code', cowork:'Claude Cowork', chat:'Claude Chat', design:'Claude Design', security:'Claude Security', api:'Model API' };

/* ---------------- render ---------------- */
const stage = document.getElementById('stage');
const railEl = document.getElementById('rail');

function render() {
  renderRail();
  stage.innerHTML = '';
  stage.appendChild(renderStep(state.step));
}

function renderRail() {
  railEl.innerHTML = '';
  STEPS.forEach((s, i) => {
    const li = document.createElement('li');
    let cls = '';
    if (i === state.step) cls = 'active';
    else if (i < state.step) cls = 'done';
    li.className = cls;
    li.innerHTML = `<span class="dot">${i < state.step ? '✓' : i+1}</span><span>${s.label}</span>`;
    railEl.appendChild(li);
  });
}

function renderStep(i) {
  const wrap = document.createElement('div');
  wrap.className = 'step' + (i === RESULT_STEP ? ' result' : '');
  if (i === 0) wrap.innerHTML = stepClouds();
  if (i === 1) wrap.innerHTML = stepDirect();
  if (i === 2) wrap.innerHTML = stepResidency();
  if (i === 3) wrap.innerHTML = stepProducts();
  if (i === 4) wrap.innerHTML = stepAddons();
  if (i === 5) wrap.innerHTML = stepResult();
  bind(wrap);
  return wrap;
}

/* ---------------- step templates ---------------- */
function stepClouds() {
  return `
    <h2>1 · Which clouds do you use today?</h2>
    <div class="sub">Select all that apply — this tells us where a native Claude model endpoint can live.</div>
    <div class="options">
      ${multiOpt('clouds','aws',logo('aws')+'AWS','Claude on Bedrock · Claude Enterprise via AWS Marketplace')}
      ${multiOpt('clouds','gcp',logo('gcp')+'Google Cloud','Claude on Vertex AI Model Garden')}
      ${multiOpt('clouds','azure',logo('azure')+'Microsoft Azure','Claude on Azure AI Foundry')}
    </div>
    <div class="note">Not on a hyperscaler, or prefer to keep this separate? Leave these unticked and continue.</div>
    ${actions(false, true)}
  `;
}

function stepDirect() {
  return `
    <h2>2 · Would you like a direct Anthropic relationship?</h2>
    <div class="sub">Contract and bill directly with Anthropic for Claude Enterprise and the Anthropic API.</div>
    <div class="options two">
      ${opt('direct','yes',logo('anthropic')+'Yes — direct with Anthropic','Fastest access to new models & the full app suite')}
      ${opt('direct','no','No — via my cloud provider','Procure through existing AWS / GCP / Azure agreements')}
    </div>
    ${state.direct === 'no' && state.clouds.size === 0
      ? `<div class="note red">You haven't selected a cloud in step 1 — you'll need either a cloud provider or a direct Anthropic relationship to consume Claude.</div>` : ''}
    ${actions(true, !!state.direct && !(state.direct==='no' && state.clouds.size===0))}
  `;
}

function stepResidency() {
  const nonAwsOnly = state.clouds.size > 0 && !state.clouds.has('aws') && state.direct === 'no';
  return `
    <h2>3 · Does inference need to stay in Australia?</h2>
    <div class="sub">Some regulated workloads require model inference (prompts & completions) to be processed onshore.</div>
    <div class="options two">
      ${opt('residency','au','Yes — must stay in AU','Data sovereignty / IRAP / regulated workload')}
      ${opt('residency','any','No — global is fine','Standard enterprise security controls are sufficient')}
    </div>
    ${state.residency === 'au'
      ? `<div class="note"><strong>AWS Bedrock (Sydney)</strong> is currently the only option that runs Claude inference in an Australian region. Claude Code and Cowork can use Bedrock Sydney as their backend, so they remain available onshore.${
          nonAwsOnly ? ` You selected ${[...state.clouds].map(labelCloud).join(' / ')} only — onshore inference would require adding AWS.` : ''
        }</div>`
      : ``}
    ${actions(true, !!state.residency)}
  `;
}

function stepProducts() {
  const au = state.residency === 'au';
  const hasAws = state.clouds.has('aws');
  const note = au
      ? `<div class="note">With AU-only inference, <strong>Claude Code</strong> and <strong>Cowork</strong> run against Bedrock Sydney. <strong>Chat</strong> is Anthropic-hosted and not served from AU today.</div>`
    : hasAws && state.direct === 'no'
      ? `<div class="note">On AWS, <strong>Claude Enterprise via AWS Marketplace</strong> gives you the full app suite — like-for-like with buying direct, billed through your AWS account.</div>`
    : '';
  return `
    <h2>4 · Which Claude products do you want?</h2>
    <div class="sub">Select all that apply.</div>
    <div class="options two">
      ${multiOpt('products','code','Claude Code','AI software engineering in your terminal & IDE')}
      ${multiOpt('products','cowork','Claude Cowork','Agentic teammate for knowledge work')}
      ${multiOpt('products','chat','Claude Chat','claude.ai for the whole organisation', au)}
      ${multiOpt('products','api','Model API','Build your own apps on Claude models')}
    </div>
    ${note}
    ${actions(true, state.products.size > 0)}
  `;
}

function stepAddons() {
  const au = state.residency === 'au';
  return `
    <h2>5 · Claude Design & Claude Security?</h2>
    <div class="sub">Specialist agentic products — both delivered via Claude Enterprise.</div>
    <div class="options">
      ${multiOpt('addons','design','Claude Design','Agentic UX & product design partner', au)}
      ${multiOpt('addons','security','Claude Security','Agentic security analyst & code review', au)}
      ${opt('addonsNone','none','Neither','Skip — just the products selected in step 4', state.addonsNone ? 'selected' : '')}
    </div>
    ${au ? `<div class="note">Design and Security don't yet support a Bedrock backend, so they aren't available with AU-only inference.</div>` : ''}
    ${actions(true, state.addons.size > 0 || state.addonsNone, 'See recommendation')}
  `;
}

function stepResult() {
  const r = recommend();
  return `
    <h2>Your path to Claude</h2>
    <div class="sub">${r.summaryLine}</div>

    <div class="reco">
      <span class="tag">Recommended</span>
      <h3>${logo(r.primary.logo)}${r.primary.title}</h3>
      <p>${r.primary.body}</p>
      ${pillRow(r.primary.caps)}
    </div>

    ${r.secondary ? `
      <div class="reco alt">
        <span class="tag">Pair with</span>
        <h3>${logo(r.secondary.logo)}${r.secondary.title}</h3>
        <p>${r.secondary.body}</p>
        ${pillRow(r.secondary.caps)}
      </div>` : ''}

    ${r.warning ? `<div class="note red">${r.warning}</div>` : ''}

    <h3 style="margin-top:26px;font-family:ui-serif,Georgia,serif;font-weight:500;">All options at a glance</h3>
    ${matrix(r.selectedApps)}

    <div class="actions">
      <button class="ghost" data-action="restart">Start over</button>
      <button class="primary" onclick="window.print()">Print / save PDF</button>
    </div>
  `;
}

/* ---------------- recommendation logic ---------------- */
const CLOUD_ENDPOINT = {
  aws:   { key: 'bedrock', title: 'AWS Bedrock', logo: 'aws',
           body: 'Claude models as a managed API inside your AWS account — IAM, VPC and CloudTrail native. Also a supported backend for Claude Code and Cowork.' },
  gcp:   { key: 'vertex', title: 'Google Cloud Vertex AI', logo: 'gcp',
           body: 'Claude models in Vertex AI Model Garden, billed to your GCP account. Also a supported backend for Claude Code and Cowork (US / EU / Global regions).' },
  azure: { key: 'azure', title: 'Microsoft Azure AI Foundry', logo: 'azure',
           body: 'Claude models in the Azure AI model catalog, billed to your Azure subscription. Model API only.' },
};

function recommend() {
  const selectedApps = [...state.products].filter(p => p !== 'api').concat([...state.addons]);
  const wantsApi  = state.products.has('api');
  const wantsFullSuite = selectedApps.some(a => a === 'chat' || a === 'design' || a === 'security');
  const wantsCodeCowork = selectedApps.some(a => a === 'code' || a === 'cowork');
  const hasAws = state.clouds.has('aws');
  const hasGcp = state.clouds.has('gcp');
  const cloudList = [...state.clouds];

  let primary, secondary = null, warning = null, summaryLine;

  /* ---- AU residency ---- */
  if (state.residency === 'au') {
    summaryLine = 'Inference must remain in Australia.';
    primary = {
      title: 'AWS Bedrock — Sydney (ap-southeast-2)', logo: 'aws',
      body: 'The only path today that keeps Claude inference onshore. Claude Code and Cowork can be configured to use Bedrock Sydney as their inference backend, so your developers and knowledge workers stay in-region.',
      caps: capsFor('bedrock', selectedApps),
    };
    const bits = [];
    if (!hasAws && cloudList.length)
      bits.push(`${cloudList.map(labelCloud).join(' and ')} ${cloudList.length>1?'do':'does'} not host Claude in an Australian region — onshore inference requires AWS.`);
    if (state.direct === 'yes')
      bits.push('Anthropic 1P (direct) does not currently serve inference from an Australian region.');
    bits.push('Claude Chat, Design and Security do not yet support a Bedrock backend, so they are unavailable with AU-only inference. Discuss a split architecture with your account team if these are needed.');
    warning = bits.join(' ');
    return { summaryLine, primary, secondary, warning, selectedApps };
  }

  /* ---- Global ---- */
  summaryLine = `Global inference acceptable · ${state.direct === 'yes'
      ? 'Direct with Anthropic' + (cloudList.length ? ` · also on ${cloudList.map(labelCloud).join(', ')}` : '')
      : `Via ${cloudList.map(labelCloud).join(', ')}`}.`;

  if (state.direct === 'yes') {
    primary = { title: 'Anthropic Direct — Claude Enterprise', logo: 'anthropic',
      body: 'The full Anthropic platform contracted directly: Claude API plus Code, Cowork, Chat, Design and Security. Fastest access to new models and features.',
      caps: capsFor('1p', selectedApps) };
    if ((wantsApi || wantsCodeCowork) && cloudList.length)
      secondary = cloudCard(cloudList, selectedApps);
  }
  else if (wantsFullSuite) {
    if (hasAws) {
      primary = { title: 'Claude Enterprise via AWS Marketplace', logo: 'aws',
        body: 'Like-for-like with buying direct from Anthropic — full access to Code, Cowork, Chat, Design and Security — procured and billed through your existing AWS agreement.',
        caps: capsFor('aws-mkt', selectedApps) };
      if (wantsApi) secondary = cloudCard(cloudList, selectedApps);
    } else {
      primary = { title: 'Anthropic Direct — Claude Enterprise', logo: 'anthropic',
        body: 'Chat, Design and Security require Claude Enterprise — available direct from Anthropic or via AWS Marketplace.',
        caps: capsFor('1p', selectedApps) };
      warning = `You'd prefer not to contract direct, but ${selectedApps.filter(a=>!['code','cowork'].includes(a)).map(a=>APP_LABELS[a]).join(', ')} ${selectedApps.filter(a=>!['code','cowork'].includes(a)).length>1?'aren\'t':'isn\'t'} available through ${cloudList.map(labelCloud).join(' or ')}. AWS Marketplace or Anthropic direct are the routes.`;
      if (cloudList.length) secondary = cloudCard(cloudList, selectedApps);
    }
  }
  else if (wantsCodeCowork) {
    if (hasAws) {
      primary = { title: 'AWS Bedrock + Claude Code / Cowork', logo: 'aws',
        body: 'License Claude Code and Cowork (via AWS Marketplace) and point them at Bedrock as the inference backend — everything procured through AWS.',
        caps: capsFor('bedrock', selectedApps) };
    } else if (hasGcp) {
      primary = { title: 'Google Cloud Vertex AI + Claude Code / Cowork', logo: 'gcp',
        body: 'License Claude Code and Cowork and point them at Vertex AI as the inference backend (US / EU / Global regions).',
        caps: capsFor('vertex', selectedApps) };
    } else { // azure only
      primary = { title: 'Anthropic Direct — Claude Enterprise', logo: 'anthropic',
        body: 'Azure AI Foundry provides model API access only; Code and Cowork require Anthropic direct or AWS Marketplace.',
        caps: capsFor('1p', selectedApps) };
      warning = `Claude Code and Cowork don't currently support Azure AI Foundry as an inference backend. AWS Marketplace or Anthropic direct are the routes.`;
      secondary = cloudCard(['azure'], selectedApps);
    }
  }
  else { // API only
    const c = CLOUD_ENDPOINT[cloudList[0]];
    primary = { title: c.title, logo: c.logo, body: c.body, caps: capsFor(c.key, selectedApps) };
    if (cloudList.length > 1) secondary = cloudCard(cloudList.slice(1), selectedApps);
  }

  return { summaryLine, primary, secondary, warning, selectedApps };
}

function cloudCard(cloudList, selectedApps) {
  const c = CLOUD_ENDPOINT[cloudList[0]];
  return { title: c.title + (cloudList.length>1 ? ` (+ ${cloudList.slice(1).map(labelCloud).join(', ')})` : ''),
    logo: c.logo, body: c.body, caps: capsFor(c.key, selectedApps) };
}

function capsFor(platformKey, selectedApps) {
  const p = PLATFORMS[platformKey];
  const caps = [
    { label: 'Model API', on: p.api },
    { label: 'AU inference', on: p.au },
  ];
  ALL_APPS.forEach(a => caps.push({ label: APP_LABELS[a], on: p.apps.has(a) }));
  return caps;
}

function pillRow(caps) {
  return `<div class="pill-row">` + caps.map(c => {
    const cls = c.on ? 'on' : 'off';
    return `<span class="pill ${cls}">${c.label}</span>`;
  }).join('') + `</div>`;
}

function matrix(selectedApps) {
  const rows = Object.values(PLATFORMS).map(p => `
    <tr>
      <td class="plat">${logo(p.logo)}${p.name}</td>
      <td>${p.au ? '<span class="au">AU ✓</span>' : '<span class="no">Global</span>'}</td>
      <td>${p.api ? '<span class="yes">✓</span>' : '<span class="no">—</span>'}</td>
      ${ALL_APPS.map(c => `<td>${p.apps.has(c) ? '<span class="yes">✓</span>' : '<span class="no">—</span>'}</td>`).join('')}
    </tr>`).join('');
  return `
    <table class="matrix">
      <thead><tr>
        <th>Platform</th><th>Inference region</th><th>Model API</th>
        ${ALL_APPS.map(c=>`<th>${APP_LABELS[c]}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function labelCloud(c){ return {aws:'AWS',gcp:'Google Cloud',azure:'Microsoft Azure'}[c]; }

/* ---------------- tiny view helpers ---------------- */
function opt(field, val, label, desc, forceCls) {
  const sel = forceCls !== undefined ? forceCls : (state[field] === val ? 'selected' : '');
  return `<div class="opt ${sel}" data-field="${field}" data-value="${val}">
    <div class="label">${label}</div><div class="desc">${desc}</div></div>`;
}
function multiOpt(field, val, label, desc, disabled=false) {
  const sel = state[field].has(val) ? 'selected' : '';
  const dis = disabled ? 'disabled' : '';
  return `<div class="opt ${sel} ${dis}" ${disabled?'':`data-multi="${field}" data-value="${val}"`}>
    <div class="label">${label}</div><div class="desc">${disabled ? 'Not available with AU-only inference' : desc}</div></div>`;
}
function actions(showBack, nextEnabled, nextLabel='Continue') {
  return `<div class="actions">
    ${showBack ? '<button class="ghost" data-action="back">Back</button>' : '<span></span>'}
    <button class="primary" data-action="next" ${nextEnabled?'':'disabled'}>${nextLabel}</button>
  </div>`;
}

/* ---------------- events ---------------- */
function bind(root) {
  root.querySelectorAll('.opt[data-field]').forEach(el =>
    el.addEventListener('click', () => {
      if (el.dataset.field === 'addonsNone') {
        state.addonsNone = !state.addonsNone;
        if (state.addonsNone) state.addons.clear();
      } else {
        state[el.dataset.field] = el.dataset.value;
      }
      render();
    }));
  root.querySelectorAll('.opt[data-multi]').forEach(el =>
    el.addEventListener('click', () => {
      const s = state[el.dataset.multi];
      s.has(el.dataset.value) ? s.delete(el.dataset.value) : s.add(el.dataset.value);
      if (el.dataset.multi === 'addons' && s.size > 0) state.addonsNone = false;
      render();
    }));
  root.querySelectorAll('[data-action]').forEach(el =>
    el.addEventListener('click', () => {
      const a = el.dataset.action;
      if (a === 'next') {
        if (state.step === RESIDENCY_STEP && state.residency === 'au') {
          state.products.delete('chat'); state.addons.clear();
        }
        state.step++;
      }
      if (a === 'back') state.step--;
      if (a === 'restart') {
        state.step = 0; state.residency = null; state.direct = null; state.addonsNone = false;
        state.clouds = new Set(); state.products = new Set(); state.addons = new Set();
      }
      render();
    }));
}

render();
</script>
</body>
</html>
